version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: moodle_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-M00dleRoot2024Secure}
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: ${DB_PASS:-M00dleDB2024Secure}
    volumes:
      - dbdata:/var/lib/mysql
    command: >
      --innodb_buffer_pool_size=256M
      --innodb_log_file_size=64M
      --innodb_flush_log_at_trx_commit=2
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: moodle_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  moodle:
    build: .
    container_name: moodle_app
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    volumes:
      - moodledata:/var/www/moodledata
      - ./public/enrol_programa.php:/var/www/html/public/enrol_programa.php
      - ./public/enrol_discipline.php:/var/www/html/public/enrol_discipline.php
      - ./public/enrolled_check.php:/var/www/html/public/enrolled_check.php
      - ./public/.htaccess:/var/www/html/public/.htaccess
      - ./public/videos:/var/www/html/public/videos
      - ./public/materiais:/var/www/html/public/materiais
      - ./htaccess-root.conf:/var/www/html/.htaccess
      - ./config.prod.php:/var/www/html/config.php
    ports:
      - "127.0.0.1:8080:80"
    environment:
      MOODLE_URL: https://ead.engenhariabiomedica.com

  nginx:
    image: nginx:alpine
    container_name: moodle_nginx
    restart: unless-stopped
    depends_on:
      - moodle
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public/videos:/var/www/html/public/videos:ro
      - ./public/materiais:/var/www/html/public/materiais:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot

  certbot:
    image: certbot/certbot
    container_name: moodle_certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot

volumes:
  dbdata:
  moodledata:
  certbot-etc:
  certbot-var:
  webroot:
