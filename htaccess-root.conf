RewriteEngine On

# Redirect /course/view.php?id=N -> /curso/<slug> (browser URL changes)
# Uses %{REQUEST_SCHEME}://%{HTTP_HOST} so it works on any environment
RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=2$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/metodologia-cientifica? [R=301,L]

RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=3$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/metodos-matematicos? [R=301,L]

RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=4$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/topicos-avancados? [R=301,L]

RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=5$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/citologia-histologia? [R=301,L]

RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=6$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/mestrado? [R=301,L]

RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=7$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/doutorado? [R=301,L]

RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=8$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/bioestatistica? [R=301,L]

RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=9$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/fisiologia-eletrofisiologia? [R=301,L]

RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=10$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/bioetica? [R=301,L]

RewriteCond %{ENV:REDIRECT_STATUS} ^$
RewriteCond %{QUERY_STRING} ^id=11$
RewriteRule ^course/view\.php$ %{REQUEST_SCHEME}://%{HTTP_HOST}/curso/seminarios? [R=301,L]

# Friendly course URLs: /curso/<slug> -> /course/view.php?id=N (internal rewrite)
RewriteRule ^curso/metodologia-cientifica$ /course/view.php?id=2 [QSA,L]
RewriteRule ^curso/metodos-matematicos$ /course/view.php?id=3 [QSA,L]
RewriteRule ^curso/topicos-avancados$ /course/view.php?id=4 [QSA,L]
RewriteRule ^curso/citologia-histologia$ /course/view.php?id=5 [QSA,L]
RewriteRule ^curso/mestrado$ /course/view.php?id=6 [QSA,L]
RewriteRule ^curso/doutorado$ /course/view.php?id=7 [QSA,L]
RewriteRule ^curso/bioestatistica$ /course/view.php?id=8 [QSA,L]
RewriteRule ^curso/fisiologia-eletrofisiologia$ /course/view.php?id=9 [QSA,L]
RewriteRule ^curso/bioetica$ /course/view.php?id=10 [QSA,L]
RewriteRule ^curso/seminarios$ /course/view.php?id=11 [QSA,L]

# /programa/mestrado -> public/enrol_programa.php?slug=mestrado
RewriteRule ^programa/([a-z]+)$ /public/enrol_programa.php?slug=$1 [QSA,L]

# PHP endpoints -> /public/
RewriteRule ^enrol_programa\.php$ /public/enrol_programa.php [QSA,L]
RewriteRule ^enrol_discipline\.php$ /public/enrol_discipline.php [QSA,L]
RewriteRule ^enrolled_check\.php$ /public/enrolled_check.php [QSA,L]

# /conteudo/* -> /public/conteudo/*
RewriteRule ^conteudo/(.*)$ /public/conteudo/$1 [QSA,L]
