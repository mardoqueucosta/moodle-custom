server {
    listen 80;
    server_name ead.engenhariabiomedica.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ead.engenhariabiomedica.com;

    ssl_certificate /etc/letsencrypt/live/ead.engenhariabiomedica.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ead.engenhariabiomedica.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 256M;

    # Arquivos estáticos servidos diretamente pelo Nginx (sem proxy para Apache)
    # Muito mais rápido para vídeos grandes e PDFs
    location /conteudo/ {
        alias /var/www/html/public/conteudo/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff;

        # Videos: cache mais longo
        location ~* \.mp4$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;
        }
    }

    # Tudo o resto vai para o Moodle (Apache)
    location / {
        proxy_pass http://moodle:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}
